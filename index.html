<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>🐱 猫猫世界大分身 · 小起司爱cheese</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="./js/main.js"></script>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <audio
      id="bgMusic"
      loop
      preload="auto"
      playsinline
      style="display: none"
      src="./assets/music1.mp3"
    ></audio>

    <div class="game-container">
      <div class="card" id="appContainer">
        <div id="welcomeView">
          <div style="text-align: center; padding: 14px 0">
            <div style="font-size: 56px">🐱📖</div>
            <h2>🐾 猫猫世界大分身 🐾</h2>
            <p class="subtitle-cat">cat-mbti</p>
            <div
              style="
                background: #ffeedb;
                border-radius: 24px;
                padding: 18px 12px;
                margin: 10px 0;
                border: 2px dashed #c38d5a;
              "
            >
              <p style="font-size: 15px; font-weight: 700">
                ✨ 欢迎你的到来 ✨
              </p>
              <p style="margin: 6px 0">
                每一只流浪猫，都可能是某个人在猫猫世界里选中的「独闯江湖」分身
              </p>
              <p style="margin-top: 12px">💕 一起关爱流浪小动物 💕</p>
            </div>
            <div class="copyright">
              <span>© 小起司爱cheese</span><span>💕</span><span>🐾</span>
            </div>
            <button class="primary-btn breathe" id="enterGameBtn">
              🐟 进入游戏
            </button>
          </div>
        </div>
        <div id="homeView" class="hidden">
          <div style="text-align: center">
            <div class="game-badge">🐾 角色初始化</div>
            <h1>✨欢迎玩家登陆✨<br />猫猫世界大分身</h1>
            <p class="subtitle-cat">cat-mbti</p>
            <div style="font-size: 48px">🐈⬛🐱🐈</div>
            <div class="loading-dots">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
            <p
              style="
                background: #fceaca;
                padding: 4px 16px;
                border-radius: 32px;
                font-size: 13px;
              "
            >
              🐠 正在连接猫猫世界服务器...
            </p>
            <button class="primary-btn breathe" id="startBtn">
              🐡 开始投放
            </button>
            <div style="margin-top: 8px; opacity: 0.6; font-size: 12px">
              🍥 你的选择，将有一只小猫分身投放异世界
            </div>
            <div class="copyright">
              <span>© 小起司爱cheese</span><span>💕</span><span>🐾</span>
            </div>
          </div>
        </div>
        <div id="quizView" class="hidden">
          <div class="progress-area" id="progressArea">
            <div class="cat-row">
              <span class="paw-left" id="pawLeft"></span>
              <span class="cat-mover" id="walkingCat">🐱</span>
            </div>
            <div class="dots-row" id="dotsContainer"></div>
          </div>
          <div style="margin: 4px 0 6px">
            <span style="font-weight: 700"
              >🍥 第 <span id="currentQNumber">1</span>/12 问</span
            >
          </div>
          <div
            style="font-size: 18px; font-weight: 800; margin-bottom: 10px"
            id="questionText"
          ></div>
          <div id="optionsContainer"></div>
          <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" style="visibility: hidden">
              ◀ 上一题</button
            ><span
              style="flex: 2; text-align: center; font-size: 12px; opacity: 0.7"
              >🐟 选完自动继续</span
            >
          </div>
        </div>
        <div
          id="transitionView"
          class="hidden"
          style="text-align: center; padding: 18px 8px"
        >
          <div style="font-size: 52px">🌀✨🐱</div>
          <h2>准备登入，那你准备好了吗？</h2>
          <div class="primary-btn breathe" id="continueToResult">
            ✨ 点击继续 ✨
          </div>
        </div>
        <div id="resultView" class="hidden">
          <div class="share-card" id="shareArea"></div>
          <button
            class="primary-btn"
            id="genPhotoBtn"
            style="font-size: 18px; padding: 12px"
          >
            📸 点击生成合影
          </button>
          <div id="photoContainer"></div>
          <button
            class="primary-btn"
            id="toEasterBtn"
            style="font-size: 18px; padding: 12px; margin-top: 6px"
          >
            📜 江湖通告</button
          ><button
            class="nav-btn"
            id="restartFromResult"
            style="display: block; margin: 6px auto 0; width: 60%; padding: 8px"
          >
            🔄 重新投放
          </button>
        </div>
        <div id="easterView" class="hidden">
          <div class="system-easter" id="easterArea"></div>
          <button class="gen-card-btn" id="genCardBtnResult">
            🃏 点击生成卡片
          </button>
          <div id="cardPhotoContainer"></div>
          <button
            class="primary-btn"
            id="genEasterBtn"
            style="font-size: 18px; padding: 12px"
          >
            📸 点击生成合影
          </button>
          <div id="easterPhotoContainer"></div>
          <div style="display: flex; gap: 8px; margin-top: 8px">
            <button class="nav-btn" id="backToResult" style="flex: 1">
              ◀ 返回结果页</button
            ><button class="nav-btn" id="restartBtn" style="flex: 1">
              🔄 再闯一次
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="musicBtn">🎵</div>
    <div class="music-hint">🎵 打开听小猫唱歌</div>
  </body>
</html>
